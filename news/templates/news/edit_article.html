{% extends 'news/base.html' %}

{% block title %}Edit Article - News App{% endblock %}

{% block content %}
<h1>Edit Article</h1>

<div class="form-container" style="max-width: 600px;">
    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" value="{{ article.title }}" required>
        </div>

        <div class="form-group">
            <label for="publisher">Publisher (optional):</label>
            <select id="publisher" name="publisher">
                <option value="">-- Independent (No Publisher) --</option>
                {% for publisher in my_publishers %}
                    <option value="{{ publisher.id }}" {% if article.publisher == publisher %}selected{% endif %}>{{ publisher.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="content">Content:</label>
            <textarea id="content" name="content" rows="10" required>{{ article.content }}</textarea>
        </div>

        <p class="meta">
            Status:
            {% if article.approved %}
                <span class="status-approved">Approved</span>
            {% else %}
                <span class="status-pending">Pending Approval</span>
            {% endif %}
        </p>

        <button type="submit" class="btn btn-success">Save Changes</button>
        <a href="{% url 'journalist_dashboard' %}" class="btn">Cancel</a>
    </form>
</div>
{% endblock %}
