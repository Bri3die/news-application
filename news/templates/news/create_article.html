{% extends 'news/base.html' %}

{% block title %}Create Article - News App{% endblock %}

{% block content %}
<h1>Create New Article</h1>

<div class="form-container" style="max-width: 600px;">
    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" required>
        </div>

        <div class="form-group">
            <label for="publisher">Publisher (optional):</label>
            <select id="publisher" name="publisher">
                <option value="">-- Independent (No Publisher) --</option>
                {% for publisher in my_publishers %}
                    <option value="{{ publisher.id }}">{{ publisher.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="content">Content:</label>
            <textarea id="content" name="content" rows="10" required></textarea>
        </div>

        <button type="submit" class="btn btn-success">Create Article</button>
        <a href="{% url 'journalist_dashboard' %}" class="btn">Cancel</a>
    </form>
</div>
{% endblock %}
